<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToTranslate Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>ToTranslate</h1>
      <p class="subtitle">Local translation powered by Ollama</p>
    </header>

    <!-- Language settings -->
    <section class="section">
      <div class="form-group">
        <label for="source-lang">Source Language</label>
        <select id="source-lang"></select>
      </div>

      <div class="swap-row">
        <button id="swap-btn" class="swap-btn" title="Swap languages">⇄</button>
      </div>

      <div class="form-group">
        <label for="target-lang">Target Language</label>
        <select id="target-lang"></select>
      </div>
    </section>

    <!-- Ollama settings -->
    <section class="section">
      <div class="form-group">
        <label for="ollama-url">Ollama Server URL</label>
        <input id="ollama-url" type="url" placeholder="http://localhost:11434" />
      </div>

      <div class="form-group">
        <label for="model-name">Model</label>
        <input id="model-name" type="text" placeholder="translategemma:4b" />
      </div>
    </section>

    <!-- Actions -->
    <div class="actions">
      <button id="test-btn" class="btn btn-outline">Test Connection</button>
      <button id="save-btn" class="btn btn-primary">Save</button>
    </div>

    <!-- Status message -->
    <div id="status" class="status" hidden></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
